<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <title>{{ article.title }} | Articles</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;600;700&family=Lexend:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style type="text/tailwindcss">
    body { font-family: 'Lexend', sans-serif; }
    h1, h2, h3 { font-family: 'Crimson Pro', serif; }
  </style>
</head>
<body class="bg-gray-50 text-slate-800 min-h-screen">

  <header class="bg-white border-b border-slate-100 shadow-sm">
    <div class="max-w-3xl mx-auto px-4 py-5 flex justify-between items-center">
      <h1 class="text-2xl sm:text-3xl font-bold text-green-800">Article</h1>
      <a href="{% url 'articles_index' %}" class="text-sm text-green-700 hover:underline">&larr; Back to Articles</a>
    </div>
  </header>

  <main class="max-w-3xl mx-auto px-4 py-10">
    <article class="bg-white rounded-xl shadow-sm border border-slate-100 p-6 sm:p-8">
      <h2 class="text-3xl font-bold text-green-800 mb-2">{{ article.title }}</h2>
      <p class="text-sm text-slate-500 mb-8">By {{ article.author }} &middot; {{ article.created_at|date:"F j, Y g:i A" }}</p>
      <div class="text-slate-700 leading-8 whitespace-pre-line">{{ article.content }}</div>
    </article>
  </main>

</body>
</html>
