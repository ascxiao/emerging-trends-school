<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <title>Add Article | University of St. La Salle</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;600;700&family=Lexend:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style type="text/tailwindcss">
    body { font-family: 'Lexend', sans-serif; }
    h1, h2, h3 { font-family: 'Crimson Pro', serif; }
  </style>
</head>
<body class="bg-gray-50 text-slate-800 min-h-screen">

  <header class="bg-white border-b border-slate-100 shadow-sm">
    <div class="max-w-2xl mx-auto px-4 py-5 flex justify-between items-center">
      <h1 class="text-3xl font-bold text-green-800">New Article</h1>
      <a href="/articles/" class="text-sm text-green-700 hover:underline">&larr; Back to Articles</a>
    </div>
  </header>

  <main class="max-w-2xl mx-auto px-4 py-10">
    <form method="post" class="bg-white rounded-xl shadow-sm border border-slate-100 p-8 space-y-6">
      {% csrf_token %}

      <div>
        <label class="block text-sm font-semibold text-slate-700 mb-1" for="title">Title</label>
        <input
          type="text"
          id="title"
          name="title"
          required
          class="w-full border border-slate-200 rounded-lg px-4 py-2.5 text-slate-800 focus:outline-none focus:ring-2 focus:ring-green-600"
          value="{{ article.title }}"
        />
      </div>

      <div>
        <label class="block text-sm font-semibold text-slate-700 mb-1" for="author">Author</label>
        <input
          type="text"
          id="author"
          name="author"
          required
          class="w-full border border-slate-200 rounded-lg px-4 py-2.5 text-slate-800 focus:outline-none focus:ring-2 focus:ring-green-600"
          value="{{ article.author }}"

        />
      </div>

      <div>
        <label class="block text-sm font-semibold text-slate-700 mb-1" for="content">Content</label>
        <textarea
          id="content"
          name="content"
          rows="8"
          required
          class="w-full border border-slate-200 rounded-lg px-4 py-2.5 text-slate-800 focus:outline-none focus:ring-2 focus:ring-green-600 resize-none"
        >{{ article.content }}</textarea>
      </div>

      <button
        type="submit"
        class="w-full bg-green-700 text-white py-3 rounded-lg font-semibold hover:bg-green-800 transition-colors"
      >
        Update Article
      </button>

      <a href="/articles/"
        class="block w-full text-center border border-green-700 text-green-700 py-3 rounded-lg font-semibold hover:bg-green-50 transition-colors">
        View All Articles
      </a>
    </form>
  </main>

</body>
</html>
