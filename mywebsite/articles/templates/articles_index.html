<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <title>Articles | University of St. La Salle</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;600;700&family=Lexend:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style type="text/tailwindcss">
    body { font-family: 'Lexend', sans-serif; }
    h1, h2, h3 { font-family: 'Crimson Pro', serif; }
  </style>
</head>
<body class="bg-gray-50 text-slate-800 min-h-screen">

  <header class="bg-white border-b border-slate-100 shadow-sm">
    <div class="max-w-4xl mx-auto px-4 py-5 flex justify-between items-center">
      <h1 class="text-3xl font-bold text-green-800">Articles</h1>
      <a href="/articles/add/" class="bg-green-700 text-white px-5 py-2 rounded-lg text-sm font-semibold hover:bg-green-800 transition-colors">
        + New Article
      </a>
    </div>
  </header>

  <main class="max-w-4xl mx-auto px-4 py-10">
    {% if articles %}
      <div class="space-y-6">
        {% for article in articles %}
        <article class="bg-white rounded-xl shadow-sm border border-slate-100 p-6">
          <h2 class="text-2xl font-bold text-green-800 mb-1">{{ article.title }}</h2>
          <p class="text-xs text-slate-400 mb-4">By {{ article.author }} &middot; {{ article.created_at|date:"F j, Y" }}</p>
          <p class="text-slate-600 leading-relaxed">{{ article.content }}</p>
        </article>
        {% endfor %}
      </div>
    {% else %}
      <div class="text-center py-24 text-slate-400">
        <p class="text-xl mb-4">No articles yet.</p>
        <a href="/articles/add/" class="text-green-700 font-semibold hover:underline">Add the first one &rarr;</a>
      </div>
    {% endif %}
  </main>

</body>
</html>
